<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
body{display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#111;flex-direction:column;gap:24px;font-family:sans-serif;color:#fff}
#preload{font-family:'Syne',sans-serif;font-weight:800;font-size:48px;position:absolute;left:-9999px}
</style>
</head>
<body>
<div id="preload">B</div>
<h3>Preview — favicon BENBIA</h3>
<p id="status" style="color:#888;font-size:13px">Cargando fuente Syne...</p>
<canvas id="preview" width="1024" height="1024" style="width:200px;height:200px;border-radius:24px"></canvas>
<div style="display:flex;gap:12px">
  <button id="dl-1024" style="padding:10px 20px;background:#edf060;color:#084c61;border:none;border-radius:6px;font-weight:bold;cursor:pointer;font-size:14px" disabled>Descargar 1024x1024</button>
  <button id="dl-512" style="padding:10px 20px;background:#6bab90;color:#084c61;border:none;border-radius:6px;font-weight:bold;cursor:pointer;font-size:14px" disabled>Descargar 512x512</button>
</div>
<script>
function renderFavicon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  const r = size * (4 / 32);
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#084c61';
  ctx.fill();

  const fontSize = size * 0.45;
  ctx.font = '800 ' + fontSize + 'px Syne, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#edf060';
  ctx.fillText('B', size / 2, size / 2);

  return canvas;
}

function download(canvas, name) {
  canvas.toBlob(function(blob) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 'image/png');
}

function init() {
  const preview = document.getElementById('preview');
  const pCtx = preview.getContext('2d');
  pCtx.drawImage(renderFavicon(1024), 0, 0);

  document.getElementById('status').textContent = 'Fuente cargada.';

  const btn1024 = document.getElementById('dl-1024');
  const btn512 = document.getElementById('dl-512');
  btn1024.disabled = false;
  btn512.disabled = false;

  btn1024.addEventListener('click', function() {
    download(renderFavicon(1024), 'favicon.png');
  });

  btn512.addEventListener('click', function() {
    download(renderFavicon(512), 'favicon-512.png');
  });
}

// Wait for font to load, then render
document.fonts.ready.then(function() {
  setTimeout(init, 500);
});
</script>
</body>
</html>
